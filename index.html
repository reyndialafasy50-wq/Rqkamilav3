<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2b394a">
    <title>Memuat... RQ Kamila</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ENGINE UTAMA TAILWIND CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-dark': '#2b394a',
                        'brand-mint': '#88dec3'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>
        /* ====================================================================
           PENGAMAN UTAMA: Memaksa layar langsung gelap sejak milidetik pertama,
           Mencegah bug layar putih berkedip saat memuat Tailwind CDN.
           ==================================================================== */
        html, body { 
            background-color: #2b394a !important; 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        
        /* Animasi Efek Denyut (Pulse) Lembut pada Logo */
        .animate-pulse-soft {
            animation: pulseSoft 2s infinite ease-in-out;
        }
        @keyframes pulseSoft {
            0%, 100% { transform: scale(0.97); box-shadow: 0 4px 20px rgba(136, 222, 195, 0.2); }
            50% { transform: scale(1.03); box-shadow: 0 10px 30px rgba(136, 222, 195, 0.4); }
        }
    </style>
</head>
<body class="bg-brand-dark text-white flex flex-col justify-center items-center overflow-hidden font-sans select-none">

    <!-- CONTAINER UTAMA -->
    <div class="flex flex-col items-center justify-center w-11/12 max-w-[400px] text-center p-6 box-border">
        
        <!-- LOGO BRAND (ANIMASI PULSE SOFT) -->
        <div class="w-[28vw] max-w-[120px] min-w-[90px] h-auto aspect-square bg-white rounded-full p-3 shadow-2xl flex items-center justify-center animate-pulse-soft transition-all duration-700">
            <img src="kamila.png" alt="Logo RQ Kamila" class="w-full h-full object-contain" onerror="this.src='https://ui-avatars.com/api/?name=RQ&background=ffffff&color=2b394a'">
        </div>
        
        <!-- TEKS JUDUL -->
        <h1 class="mt-6 text-3xl font-bold tracking-wider text-white drop-shadow-sm">
            RQ Kamila
        </h1>
        <p class="text-sm text-brand-mint font-medium tracking-wide mt-1">
            Manajemen Santri Terpadu
        </p>
        
        <!-- KATA MOTIVASI / HADITS -->
        <div class="mt-8 text-sm font-light text-gray-300 italic leading-relaxed max-w-[320px]">
            "Sebaik-baik kalian adalah orang yang belajar Al-Qur'an dan mengajarkannya."
            <span class="block mt-2 text-xs font-semibold text-brand-mint not-italic">(HR. Bukhari)</span>
        </div>
        
        <!-- LOADING DOTS BOUNCE -->
        <div class="mt-8 flex gap-2">
            <div class="w-2.5 h-2.5 bg-brand-mint rounded-full animate-bounce" style="animation-delay: -0.3s;"></div>
            <div class="w-2.5 h-2.5 bg-brand-mint rounded-full animate-bounce" style="animation-delay: -0.15s;"></div>
            <div class="w-2.5 h-2.5 bg-brand-mint rounded-full animate-bounce"></div>
        </div>
    </div>

    <!-- SCRIPT SMART ROUTING -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                if (localStorage.getItem('ustadz_username')) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'login.html';
                }
            }, 3000); 
        });
    </script>

    <!-- SCRIPT ENGINE PWA (KEEPALIVE) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('Mesin Aplikasi PWA Aktif di Splash Screen!', registration.scope);
                })
                .catch(err => {
                    console.log('PWA gagal dimuat: ', err);
                });
            });
        }
    </script>
</body>
</html>
